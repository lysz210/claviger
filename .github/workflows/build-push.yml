name: Build and Push Native ARM64 Container

on:
  push:
    branches: [ "main" ] # Triggers whenever you push to main

env:
  REGISTRY: ghcr.io
  # This uses your github repository name in lowercase as the image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permissions required to write images to GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # Required to emulate ARM64 architecture on standard GitHub runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Sets up Docker Buildx for multi-architecture image packaging
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Logs into GitHub Container Registry using the built-in GitHub token
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Convert repository name to lowercase to prevent Docker tagging issues
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build Native App and Push Container
        run: |
          ./gradlew build -Dnative \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:23.1-jdk21-arm64 \
            -Dquarkus.docker.buildx.platform=linux/arm64 \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=${{ env.REGISTRY }} \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.name=${{ github.event.repository.name }} \
            -Dquarkus.container-image.tag=latest