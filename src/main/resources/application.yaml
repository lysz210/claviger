
intervals:
  base-url: https://intervals.icu
  oauth:
    client-id: ${INTERVALS_CLIENT_ID}
    secret: ${INTERVALS_CLIENT_SECRET}


quarkus:
  config:
#    mapping:
#      validate-unknown: false
    locations:
      - "${CAPACNAN_BLUEPRINT_ROOT_URI:}"
      - "${CAPACNAN_BLUEPRINT_CREDENTIALS_URI:}"

  devservices:
    enabled: false
  rest-client:
    intervals:
      url: ${intervals.base-url}
  messaging:
    nats:
      connection:
        servers:
          - "${CAPACNAN_SERVER_URI:nats://localhost:4222}"

'%dev':
  quarkus:
    rest-client:
      intervals:
        logging:
          scope: all
          body-limit: 10240
    log:
      #      level: DEBUG
      category:
        "io.quarkus.rest.client.reactive":
          level: DEBUG
